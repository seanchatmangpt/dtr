name: CI

on:
  push:
    branches: [main, master, develop]
    # Don't run CI on tag pushes — publish.yml handles those
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms512m
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Verify
        run: ./mvnw verify -T1C

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'
