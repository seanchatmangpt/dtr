name: Test Deployment Pipeline

on:
  workflow_call:
    inputs:
      test_type:
        description: 'Type of test deployment (dry-run, staging, production, rollback)'
        required: true
        default: 'dry-run'
        type: string

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging, production, test)'
        required: true
        default: 'staging'
        type: string
      test_mode:
        description: 'Test mode (full, quick, security-only, performance-only)'
        required: true
        default: 'full'
        type: string

# Test deployment environment
env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms1g
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn
    -Dmaven.compiler.release=26

jobs:
  # Test deployment configuration
  test-config:
    name: Test Deployment Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Test Maven settings
        run: |
          echo "🔧 Testing Maven settings..."

          # Create test settings
          mkdir -p ~/.m2
          cat > ~/.m2/settings-test.xml << EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${{ secrets.CENTRAL_TOKEN_USERNAME }}</username>
                <password>${{ secrets.CENTRAL_TOKEN_PASSWORD }}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>test</id>
                <activation>
                  <activeByDefault>true</activeByDefault>
                </activation>
                <properties>
                  <gpg.passphrase>${{ secrets.GPG_SIGNING_KEY_PASSWORD }}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>test</activeProfile>
            </activeProfiles>
          </settings>
          EOF

          # Test settings with Maven
          ./mvnw help:effective-settings -s ~/.m2/settings-test.xml

      - name: Validate deployment plugins
        run: |
          echo "📦 Validating deployment plugins..."

          # Check plugins are configured correctly
          ./mvnw help:evaluate -Dexpression=project.build.plugins.plugin.artifactId -q | while read plugin; do
            if [[ "$plugin" == *"central-publishing"* ]]; then
              echo "✅ Found: $plugin"
            elif [[ "$plugin" == *"maven-gpg"* ]]; then
              echo "✅ Found: $plugin"
            fi
          done

  # Dry run deployment test
  dry-run-deploy:
    name: Dry Run Deployment
    runs-on: ubuntu-latest
    needs: test-config
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Generate GPG key
        run: |
          echo "🔐 Setting up GPG for dry run..."
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --import --batch --passphrase "${{ secrets.GPG_SIGNING_KEY_PASSWORD }}"
          gpg --armor --export "$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)" > public-key.asc

      - name: Dry run deployment
        run: |
          echo "🚀 Running dry run deployment..."

          # Run deploy with dry-run (multi-module)
          ./mvnw deploy -Prelease -DdryRun=true -T1C

          echo "✅ Dry run completed successfully"

  # Staging deployment test
  staging-deploy:
    name: Staging Deployment
    runs-on: ubuntu-latest
    needs: test-config
    if: inputs.test_type == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Generate GPG key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --import --batch --passphrase "${{ secrets.GPG_SIGNING_KEY_PASSWORD }}"
          gpg --armor --export "$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)" > public-key.asc

      - name: Staging deployment
        run: |
          echo "🚀 Deploying to staging..."

          # Deploy to staging (use different staging repository if needed)
          ./mvnw deploy -Prelease -T1C

          echo "✅ Staging deployment completed"

      - name: Verify staging deployment
        run: |
          echo "🔍 Verifying staging deployment..."

          # Check if artifacts are in staging (this would need Central Portal API)
          echo "Staging deployment verified. Check https://central.sonatype.com/staging"

  # Production deployment test (only on tags)
  production-deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    needs: [test-config, staging-deploy]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Generate GPG key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --import --batch --passphrase "${{ secrets.GPG_SIGNING_KEY_PASSWORD }}"
          gpg --armor --export "$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)" > public-key.asc

      - name: Production deployment
        run: |
          echo "🚀 Deploying to production..."

          # Final production deployment (multi-module)
          ./mvnw deploy -Prelease -T1C

          echo "✅ Production deployment completed"

      - name: Verify production deployment
        run: |
          echo "🔍 Verifying production deployment..."

          # Wait a bit for propagation
          sleep 30

          echo "Production deployment verified. Check https://central.sonatype.com"

  # Rollback test
  rollback-test:
    name: Rollback Test
    runs-on: ubuntu-latest
    needs: test-config
    if: inputs.test_type == 'rollback'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Simulate rollback
        run: |
          echo "🔄 Simulating rollback..."

          # This would typically close staging repositories
          echo "Closing staging repositories..."

          # In real scenario, this would use Central Portal API to close staging
          # curl -X POST -u "${{ secrets.CENTRAL_TOKEN_USERNAME }}:${{ secrets.CENTRAL_TOKEN_PASSWORD }}" \
          #   https://central.sonatype.com/api/v1/staging/bulk/close

          echo "✅ Rollback simulation completed"

  # Performance test
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: test-config
    if: inputs.test_mode == 'performance-only'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build performance test
        run: |
          echo "⏱️  Running build performance test..."

          # Time the build
          time ./mvnw clean compile -T1C

          echo "⏱️  Running test performance test..."

          # Time the tests
          time ./mvnw test -T1C

          echo "⏱️  Running package performance test..."

          # Time the package
          time ./mvnw package -Prelease -T1C

  # Security test
  security-test:
    name: Security Test
    runs-on: ubuntu-latest
    needs: test-config
    if: inputs.test_mode == 'security-only'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          # Fix: SDKMAN may be partially installed on runners
          # Always clean reinstall to ensure sdkman-init.sh exists
          rm -rf "$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Run dependency check
        uses: dependency-check/actions/dependency-check@v3
        with:
          project: "DTR"
          path: "."
          format: "ALL"

      - name: Check for vulnerabilities
        run: |
          echo "🔒 Running security vulnerability check..."

          # Check for common vulnerabilities
          ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=5

          # Check for hardcoded secrets
          echo "🔍 Checking for hardcoded secrets..."

          # This is a basic check - in production, use tools like detect-secrets
          if grep -r -i "password\s*=\s*['\"][^'\"]*['\"]" src/ || \
             grep -r -i "token\s*=\s*['\"][^'\"]*['\"]" src/ || \
             grep -r -i "secret\s*=\s*['\"][^'\"]*['\"]" src/; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          fi

          echo "✅ Security tests passed"

  # Generate test report
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [dry-run-deploy, staging-deploy, production-deploy, rollback-test, performance-test, security-test]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "📊 Test Deployment Report"
          echo "========================"

          echo "🔧 Configuration Test: ${{ needs.test-config.result }}"
          echo "🚫 Dry Run Test: ${{ needs.dry-run-deploy.result }}"
          echo "🎭 Staging Test: ${{ needs.staging-deploy.result }}"
          echo "🎯 Production Test: ${{ needs.production-deploy.result }}"
          echo "🔄 Rollback Test: ${{ needs.rollback-test.result }}"
          echo "⏱️  Performance Test: ${{ needs.performance-test.result }}"
          echo "🔒 Security Test: ${{ needs.security-test.result }}"

          echo ""
          echo "📝 Summary:"
          CONFIG_RESULT="${{ needs.test-config.result }}"
          DRY_RUN_RESULT="${{ needs.dry-run-deploy.result }}"
          STAGING_RESULT="${{ needs.staging-deploy.result }}"

          if [ "$CONFIG_RESULT" == "success" ] && \
             [ "$DRY_RUN_RESULT" == "success" ] && \
             [ "$STAGING_RESULT" == "success" ]; then
            echo "✅ All tests passed!"
            echo "🚅 Ready for production deployment"
          else
            echo "❌ Some tests failed"
            echo "🔧 Check the logs above for details"
          fi
