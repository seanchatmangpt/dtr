name: Publish to Maven Central

# Triggered ONLY by final version tags (no -rc.) created via `make release-*`
# RC tags are handled by publish-rc.yml
on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms1g
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────────────────
  build:
    name: Build & Test
    # Final releases only — RC tags are routed to publish-rc.yml via job condition
    if: "!contains(github.ref_name, '-rc.')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          set -e
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw clean verify --no-transfer-progress

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # ── 2. Deploy to Maven Central ─────────────────────────────────────────────
  deploy:
    name: Deploy to Maven Central
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: |
            ~/.sdkman/candidates/java
            ~/.sdkman/archives
          key: ${{ runner.os }}-sdkman-java-26-ea-13-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-java-26-ea-13-
            ${{ runner.os }}-sdkman-

      - name: Set up Java 26 via SDKMAN
        run: |
          set -e
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 26.ea.13-graal
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> $GITHUB_ENV
          echo "$HOME/.sdkman/candidates/java/current/bin" >> $GITHUB_PATH

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Configure GPG agent for loopback
        run: |
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --import --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}"

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>gpg</id>
                <activation><activeByDefault>true</activeByDefault></activation>
                <properties>
                  <gpg.keyname>${env.GPG_KEY_ID}</gpg.keyname>
                  <gpg.passphrase>${env.GPG_PASSPHRASE}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
          </settings>
          EOF
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy
        run: ./mvnw clean deploy -Prelease -DskipTests --no-transfer-progress
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── 3. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "DTR ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
