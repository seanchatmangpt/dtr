name: Publish

# Final release (v2026.3.0)         → verify → Maven Central → GitHub Release
# Release candidate (v2026.3.0-rc.1) → verify → GitHub Packages only
#
# Triggered by: scripts/release.sh or scripts/release-rc.sh via the Makefile.
# The human runs: make release-minor  (or patch / year / rc-*)
# The script tags and pushes. This workflow fires on the tag.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # final:  v2026.3.0
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+' # RC:     v2026.3.0-rc.1

env:
  JAVA_VERSION: '26'
  MAVEN_OPTS: >-
    -Xmx2g
    -Xms512m
    -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
    -Dorg.slf4j.simpleLogger.defaultLogLevel=warn

jobs:
  # ── Classify the tag ──────────────────────────────────────────────────────
  classify:
    name: Classify Tag
    runs-on: ubuntu-latest
    outputs:
      is_final: ${{ steps.classify.outputs.is_final }}
      is_rc: ${{ steps.classify.outputs.is_rc }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - name: Classify
        id: classify
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
            echo "is_final=false" >> "$GITHUB_OUTPUT"
            echo "is_rc=true"     >> "$GITHUB_OUTPUT"
          else
            echo "is_final=true"  >> "$GITHUB_OUTPUT"
            echo "is_rc=false"    >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Gate: verify must pass before any publish ─────────────────────────────
  build:
    name: Build & Test
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Verify
        run: ./mvnw clean verify --no-transfer-progress

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # ── Publish final release to Maven Central ────────────────────────────────
  deploy:
    name: Deploy to Maven Central
    needs: [classify, build]
    runs-on: ubuntu-latest
    if: needs.classify.outputs.is_final == 'true'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>gpg</id>
                <activation><activeByDefault>true</activeByDefault></activation>
                <properties>
                  <gpg.keyname>${env.GPG_KEY_ID}</gpg.keyname>
                  <gpg.passphrase>${env.GPG_PASSPHRASE}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
          </settings>
          EOF
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy to Maven Central
        run: ./mvnw clean deploy -Prelease -DskipTests --no-transfer-progress
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── Publish RC to GitHub Packages ─────────────────────────────────────────
  deploy-rc:
    name: Deploy RC to GitHub Packages
    needs: [classify, build]
    runs-on: ubuntu-latest
    if: needs.classify.outputs.is_rc == 'true'
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy RC to GitHub Packages
        run: |
          ./mvnw deploy \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Create GitHub Release (final only) ───────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [classify, deploy]
    runs-on: ubuntu-latest
    if: needs.classify.outputs.is_final == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.classify.outputs.version }}
        run: |
          NOTES_FILE="docs/releases/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "v${VERSION}" \
              --title "DTR ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          else
            gh release create "v${VERSION}" \
              --title "DTR ${VERSION}" \
              --generate-notes \
              --verify-tag
          fi
